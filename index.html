<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA 3D PLUS Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #1a1a1a; color: white; margin: 0; padding: 15px; }
        h2 { text-align: center; color: #00d2ff; }
        #catalog { display: flex; flex-direction: column; gap: 20px; margin-top: 20px; }
        .card { background: #262626; border-radius: 15px; padding: 15px; border: 1px solid #333; box-shadow: 0 4px 10px rgba(0,0,0,0.3); text-align: center; }
        .card img { width: 100%; max-height: 250px; object-fit: cover; border-radius: 10px; margin-bottom: 15px; display: none; }
        .card h3 { margin: 10px 0 5px; font-size: 1.2em; }
        .card p { color: #aaa; font-size: 0.9em; margin-bottom: 15px; line-height: 1.4; }
        .price { color: #00d2ff; font-size: 1.4em; font-weight: bold; margin-bottom: 15px; }
        button { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-size: 1em; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:active { transform: scale(0.98); background: #0077b3; }
        .loader { text-align: center; color: #888; margin-top: 50px; }
    </style>
</head>
<body>

    <h2>UA 3D PLUS</h2>
    <div id="catalog"><div class="loader">Загрузка товаров...</div></div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        // 1. https://docs.google.com/spreadsheets/d/e/2PACX-1vQp8hJG9TmZSxSbCNLWPuoDwqurKPHA2JwL7B3kJJ5gpBN2dsJNMgDWPSnoBwdeDbYM9PhH-1HiLyoh/pub?output=csv
        const csvUrl = 'ССЫЛКА_ИЗ_ГУГЛ_ТАБЛИЦ'; 
        
        // 2. Твоя цена за 1 грамм (можешь менять здесь)
        const pricePerGram = 5; 

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                const text = await response.text();
                
                // Разбиваем на строки и убираем пустые
                const rows = text.split('\n').filter(row => row.trim() !== '');
                const dataRows = rows.slice(1); // Пропускаем заголовок таблицы
                
                let htmlContent = '';

                dataRows.forEach(row => {
                    // Используем регулярное выражение для правильного разделения CSV (с учетом запятых внутри кавычек)
                    const columns = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                    
                    if (columns.length >= 3) {
                        const name = columns[0].replace(/"/g, '').trim();
                        const desc = columns[1].replace(/"/g, '').trim();
                        // Очищаем вес от всего, кроме цифр и точек
                        const weightRaw = columns[2].replace(/[^0-9.]/g, '');
                        const weight = parseFloat(weightRaw);
                        const photo = columns[3] ? columns[3].replace(/"/g, '').trim() : '';

                        if (!isNaN(weight)) {
                            const finalPrice = Math.round(weight * pricePerGram);
                            htmlContent += `
                                <div class="card">
                                    ${photo ? `<img src="${photo}" style="display:block;" onerror="this.style.display='none'">` : ''}
                                    <h3>${name}</h3>
                                    <p>${desc}</p>
                                    <div class="price">${finalPrice} грн</div>
                                    <button onclick="sendOrder('${name}', ${finalPrice})">Заказать</button>
                                </div>
                            `;
                        }
                    }
                });

                document.getElementById('catalog').innerHTML = htmlContent || '<div class="loader">Товары пока не добавлены в таблицу</div>';
            } catch (error) {
                document.getElementById('catalog').innerHTML = '<div class="loader">Ошибка загрузки. Проверьте ссылку на таблицу!</div>';
            }
        }

        function sendOrder(name, price) {
            tg.sendData(`Заказ: ${name} (${price} грн)`);
            tg.close();
        }

        loadData();
    </script>
</body>
</html>
