<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA 3D PLUS Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1a1a1a; color: white; padding: 10px; margin: 0; text-align: center; }
        .categories { display: flex; overflow-x: auto; gap: 10px; padding: 10px 0; margin-bottom: 15px; scrollbar-width: none; }
        .categories::-webkit-scrollbar { display: none; }
        .cat-btn { background: #333; color: white; border: 1px solid #444; padding: 8px 15px; border-radius: 20px; white-space: nowrap; cursor: pointer; }
        .cat-btn.active { background: #0088cc; border-color: #0088cc; }
        .card { background: #262626; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #333; }
        .card img { width: 100%; border-radius: 10px; margin-bottom: 10px; display: none; }
        .price { color: #00d2ff; font-size: 1.3em; font-weight: bold; margin: 10px 0; }
        button.buy-btn { background: #0088cc; color: white; border: none; padding: 12px; border-radius: 10px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>
    <h2>UA 3D PLUS</h2>
    <div class="categories" id="categories">
        <button class="cat-btn active" onclick="filterCat('Все')">Все</button>
    </div>
    <div id="catalog">Загрузка...</div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();

        const CSV_URL = 'ВАША_ССЫЛКА_CSV'; 
        const PRICE_PER_GRAM = 6; 
        let allProducts = [];

        async function loadCatalog() {
            try {
                const response = await fetch(CSV_URL);
                const data = await response.text();
                const rows = data.split('\n').filter(row => row.trim() !== '').slice(1);
                
                const catContainer = document.getElementById('categories');
                const cats = new Set();

                allProducts = rows.map(row => {
                    const col = row.split(',');
                    const p = {
                        name: col[0]?.trim(),
                        desc: col[1]?.trim(),
                        weight: parseFloat(col[2]),
                        photo: col[3]?.trim(),
                        cat: col[4]?.trim() || 'Разное'
                    };
                    if (p.cat) cats.add(p.cat);
                    return p;
                });

                cats.forEach(c => {
                    catContainer.innerHTML += `<button class="cat-btn" onclick="filterCat('${c}')">${c}</button>`;
                });

                renderProducts('Все');
            } catch (e) { document.getElementById('catalog').innerText = 'Ошибка загрузки'; }
        }

        function renderProducts(category) {
            let html = '';
            const filtered = category === 'Все' ? allProducts : allProducts.filter(p => p.cat === category);
            
            filtered.forEach(p => {
                const price = Math.round(p.weight * PRICE_PER_GRAM);
                if (isNaN(price)) return;
                html += `
                    <div class="card">
                        ${p.photo ? `<img src="${p.photo}" style="display:block;">` : ''}
                        <h3>${p.name}</h3>
                        <p style="color:#aaa; font-size:0.9em;">${p.desc}</p>
                        <div class="price">${price} грн</div>
                        <button class="buy-btn" onclick="order('${p.name}', ${price})">Заказать</button>
                    </div>`;
            });
            document.getElementById('catalog').innerHTML = html;
        }

        function filterCat(cat) {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.innerText === cat));
            renderProducts(cat);
        }

        function order(name, price) {
            tg.sendData(`Заказ: ${name} (${price} грн)`);
            tg.close();
        }

        loadCatalog();
    </script>
</body>
</html>
