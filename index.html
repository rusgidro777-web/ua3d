<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; padding: 15px; margin: 0; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        input, select { background: #2a2a2a; color: white; border: 1px solid #444; padding: 12px; width: 100%; border-radius: 10px; margin-bottom: 10px; box-sizing: border-box; }
        .btn { background: #0088cc; color: white; border: none; padding: 15px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h3>Оформление заказа</h3>
        <input type="text" id="name" placeholder="ФИО получателя">
        <input type="text" id="phone" placeholder="Телефон">
        <input type="text" id="addr" placeholder="Город и № почты">
        <select id="method">
            <option value="Карта (Mono)">💳 Карта (Mono)</option>
            <option value="Наложенный платеж">📦 Почта</option>
        </select>
        <button class="btn" onclick="sendOrder()">✅ ПОДТВЕРДИТЬ</button>
    </div>

    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendOrder() {
            const data = {
                order: "3D Деталь (UA 3D PLUS)",
                total: "450",
                method: document.getElementById('method').value,
                client: `ФИО: ${document.getElementById('name').value}\nТел: ${document.getElementById('phone').value}\nАдрес: ${document.getElementById('addr').value}`
            };
            tg.sendData(JSON.stringify(data));
            tg.close();
        }
    </script>
</body>
</html>
