<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA 3D PLUS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --main-color: #0088cc; --bg-color: #121212; --card-bg: #1e1e1e; }
        body { font-family: sans-serif; background: var(--bg-color); color: white; margin: 0; padding: 20px; }
        .card { background: var(--card-bg); border-radius: 15px; padding: 15px; border: 1px solid #333; margin-bottom: 15px; }
        .price { color: #00d2ff; font-weight: bold; font-size: 1.2em; }
        .btn { background: var(--main-color); color: white; border: none; padding: 10px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <h2>UA 3D PLUS</h2>
        <p>Каталог загружается...</p>
        <button class="btn" onclick="tg.close()">Закрыть</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
    </script>
</body>
</html>
