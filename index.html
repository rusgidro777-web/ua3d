<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA 3D PLUS Shop</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c1c; color: white; text-align: center; padding: 20px; }
        .item { background: #2d2d2d; border-radius: 10px; padding: 15px; margin-bottom: 20px; border: 1px solid #444; }
        button { background-color: #0088cc; color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <h1>Магазин UA 3D PLUS</h1>
    <div class="item">
        <h3>🚗 Колпачки на фаркоп</h3>
        <p>Индивидуальный дизайн, Viking-style, Pudge и другие.</p>
        <button onclick="sendOrder('Колпачок на фаркоп')">Заказать</button>
    </div>
    <div class="item">
        <h3>🦖 Flexi-игрушки</h3>
        <p>Подвижные драконы и антистресс-фигурки.</p>
        <button onclick="sendOrder('Flexi-игрушка')">Заказать</button>
    </div>
    <script>
        let tg = window.Telegram.WebApp;
        tg.expand();
        function sendOrder(name) {
            tg.sendData("Заказ: " + name);
            tg.close();
        }
    </script>
</body>
</html>
